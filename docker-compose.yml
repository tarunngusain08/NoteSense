services:
  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - notesense-network
    restart: unless-stopped

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=notesense
      - DB_PASSWORD=notesense_password
      - DB_NAME=notesense_db
      - JWT_SECRET=${JWT_SECRET:-default_secret_key}
    depends_on:
      - postgres
    networks:
      - notesense-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:13-alpine
    environment:
      - POSTGRES_DB=notesense_db
      - POSTGRES_USER=notesense
      - POSTGRES_PASSWORD=notesense_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Optional: Add init scripts
      # - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - notesense-network
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U notesense -d notesense_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local

networks:
  notesense-network:
    driver: bridge